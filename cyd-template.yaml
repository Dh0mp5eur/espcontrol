# ============================================================
# ESP32-2432S028 (CYD / Cheap Yellow Display) — Base Template
# Board: ILI9341 variant (USB micro)
# Framework: ESP-IDF
# ============================================================

esphome:
  name: cyd-device
  friendly_name: "CYD Device"
  on_boot:
    priority: -10
    then:
      - script.execute: sleep_timer

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: !secret api_cyd

ota:
  - platform: esphome
    password: !secret esphome_ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "CYD-Fallback"
    password: !secret esphome_wifi_password

captive_portal:

# --------------------------------------------------
# SPI buses — display + touchscreen
# --------------------------------------------------
spi:
  - id: lcd
    clk_pin: GPIO14
    mosi_pin: GPIO13

  - id: touch_bus
    clk_pin: GPIO25
    mosi_pin: GPIO32
    miso_pin: GPIO39

# --------------------------------------------------
# Display — ILI9341 (320x240)
# --------------------------------------------------
display:
  - platform: mipi_spi
    id: my_display
    spi_id: lcd
    model: ESP32-2432S028
    cs_pin:
      number: GPIO15
      ignore_strapping_warning: true
    dc_pin:
      number: GPIO2
      ignore_strapping_warning: true
    reset_pin:
      number: GPIO12
      ignore_strapping_warning: true
    color_order: bgr
    invert_colors: true
    update_interval: never
    auto_clear_enabled: false

# --------------------------------------------------
# Touchscreen — XPT2046
# --------------------------------------------------
touchscreen:
  - platform: xpt2046
    id: ts_touch
    display: my_display
    spi_id: touch_bus
    cs_pin: GPIO33
    update_interval: 50ms
    threshold: 200
    calibration:
      x_min: 500
      x_max: 3650
      y_min: 380
      y_max: 3600
    transform:
      swap_xy: false
      mirror_x: true
      mirror_y: false
    on_touch:
      then:
        - script.execute: wake_screen

# --------------------------------------------------
# Outputs — backlight + RGB LED
# --------------------------------------------------
output:
  - platform: ledc
    pin: GPIO21
    id: gpio_backlight_pwm

  - platform: ledc
    id: rgb_led_red
    pin: GPIO4
    inverted: true

  - platform: ledc
    id: rgb_led_green
    pin: GPIO16
    inverted: true

  - platform: ledc
    id: rgb_led_blue
    pin: GPIO17
    inverted: true

# --------------------------------------------------
# Lights — backlight + RGB LED
# --------------------------------------------------
light:
  - platform: monochromatic
    output: gpio_backlight_pwm
    name: "Backlight"
    id: back_light
    restore_mode: ALWAYS_ON

  - platform: rgb
    name: "RGB LED"
    id: rgb_led
    red: rgb_led_red
    green: rgb_led_green
    blue: rgb_led_blue
    restore_mode: ALWAYS_OFF

# --------------------------------------------------
# Sensors
# --------------------------------------------------
sensor:
  - platform: adc
    pin: GPIO34
    id: ambient_light
    name: "Ambient Light"
    attenuation: 12db
    update_interval: 5s

# --------------------------------------------------
# Globals
# --------------------------------------------------
globals:
  - id: screen_asleep
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: antiburn_x
    type: int
    restore_value: no
    initial_value: '0'

  - id: antiburn_y
    type: int
    restore_value: no
    initial_value: '0'

# --------------------------------------------------
# Scripts — sleep, wake, antiburn
# --------------------------------------------------
script:
  - id: sleep_timer
    mode: restart
    then:
      - delay: 120s
      - lambda: id(screen_asleep) = true;
      - light.turn_off:
          id: back_light
          transition_length: 1s
      - script.execute: antiburn_loop

  - id: wake_screen
    mode: restart
    then:
      - if:
          condition:
            lambda: return id(screen_asleep);
          then:
            - lambda: id(screen_asleep) = false;
            - script.stop: antiburn_loop
            - lvgl.widget.update:
                id: antiburn_pixel
                x: -10
                y: -10
            - light.turn_on:
                id: back_light
                transition_length: 0.5s
      - script.execute: sleep_timer

  - id: antiburn_loop
    mode: single
    then:
      - while:
          condition:
            lambda: return id(screen_asleep);
          then:
            - lambda: |-
                id(antiburn_x) = (id(antiburn_x) + 47) % 320;
                id(antiburn_y) = (id(antiburn_y) + 31) % 240;
            - lvgl.widget.update:
                id: antiburn_pixel
                x: !lambda return id(antiburn_x);
                y: !lambda return id(antiburn_y);
            - delay: 30s

# --------------------------------------------------
# Fonts
# --------------------------------------------------
font:
  - file: "gfonts://Roboto@400"
    id: font_large
    size: 32
    bpp: 4
    glyphs: "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz :!,.?+-_/°%"

  - file: "gfonts://Roboto@400"
    id: font_medium
    size: 18
    bpp: 4
    glyphs: "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz :!,.?+-_/°%"

  - file: "gfonts://Roboto@400"
    id: font_small
    size: 14
    bpp: 4
    glyphs: "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz :!,.?+-_/°%"

# --------------------------------------------------
# LVGL — UI framework
# --------------------------------------------------
lvgl:
  displays:
    - my_display

  touchscreens:
    - touchscreen_id: ts_touch

  rotation: 90

  top_layer:
    widgets:
      - obj:
          id: antiburn_pixel
          x: -10
          y: -10
          width: 2
          height: 2
          bg_color: 0x111111
          bg_opa: COVER
          border_width: 0
          radius: 0
          clickable: false

  pages:
    - id: main_page
      bg_color: 0x000000
      bg_opa: COVER
      widgets:
        - label:
            id: lbl_title
            align: TOP_MID
            y: 20
            width: 300
            height: 40
            text: "CYD Ready"
            text_font: font_large
            text_color: 0xFFFFFF
            text_align: CENTER

        - label:
            id: lbl_subtitle
            align: CENTER
            width: 300
            height: 24
            text: "Touch the button below"
            text_font: font_medium
            text_color: 0xAAAAAA
            text_align: CENTER

        - button:
            align: BOTTOM_MID
            y: -30
            width: 200
            height: 50
            bg_color: 0x2196F3
            bg_opa: COVER
            border_width: 0
            radius: 12
            on_click:
              then:
                - lvgl.page.show: second_page
            widgets:
              - label:
                  align: CENTER
                  text: "Next Page"
                  text_font: font_medium
                  text_color: 0xFFFFFF
                  text_align: CENTER

    - id: second_page
      bg_color: 0x1A1A2E
      bg_opa: COVER
      widgets:
        - label:
            align: CENTER
            width: 300
            height: 40
            text: "Page 2"
            text_font: font_large
            text_color: 0xFFFFFF
            text_align: CENTER

        - button:
            align: BOTTOM_MID
            y: -30
            width: 200
            height: 50
            bg_color: 0x2196F3
            bg_opa: COVER
            border_width: 0
            radius: 12
            on_click:
              then:
                - lvgl.page.show: main_page
            widgets:
              - label:
                  align: CENTER
                  text: "Back Home"
                  text_font: font_medium
                  text_color: 0xFFFFFF
                  text_align: CENTER
