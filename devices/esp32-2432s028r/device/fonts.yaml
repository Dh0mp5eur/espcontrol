# =============================================================================
# FONTS (DEVICE OVERRIDE) - Smaller fonts for the 320x240 display
# =============================================================================
# Supplements the common fonts with smaller variants for the main UI.
# The common fonts (icon_font, label_font, etc.) still load for setup screens;
# these _xs variants are referenced by the device theme and LVGL config.
# =============================================================================

font:
  # Button icons (32px, smaller for 320x240)
  - file: 'https://github.com/Templarian/MaterialDesign-Webfont/raw/v7.4.47/fonts/materialdesignicons-webfont.ttf'
    id: icon_font_xs
    size: 32
    bpp: 4
    glyphs: !include ../../../common/assets/icon_glyphs.yaml

  # Button labels (14px)
  - file: "gfonts://Roboto"
    id: label_font_xs
    size: 14
    bpp: 4
    glyphs: !include ../../../common/assets/text_glyphs.yaml

  # Sensor value number (28px)
  - file: "gfonts://Roboto@Light"
    id: statistics_font_xs
    size: 28
    bpp: 4
    glyphs:
      - "0123456789.-°/%kWhVA "
      - ":"

  # Top bar clock and temperature (14px)
  - file: "gfonts://Roboto"
    id: clockbar_font_xs
    size: 14
    bpp: 4

  # Climate detail page: oversized target temperature (64px for 320x240)
  - file: "gfonts://Roboto@Light"
    id: climate_target_font_xs
    size: 64
    bpp: 4
    glyphs:
      - "0123456789.-"

  # Forecast high / low values (22px)
  - file: "gfonts://Roboto@Light"
    id: forecast_font_xs
    size: 22
    bpp: 4
    glyphs:
      - "0123456789.- /"

  # Forecast unit label (12px)
  - file: "gfonts://Roboto"
    id: forecast_unit_font_xs
    size: 12
    bpp: 4
    glyphs:
      - "°CF"

  # Climate control icons (24px — chevron, dots, minus, plus, thermometer)
  - file: 'https://github.com/Templarian/MaterialDesign-Webfont/raw/v7.4.47/fonts/materialdesignicons-webfont.ttf'
    id: climate_control_icon_font_xs
    size: 24
    bpp: 4
    glyphs:
      - "\U000F0141"  # mdi-chevron-left
      - "\U000F01D8"  # mdi-dots-horizontal
      - "\U000F0374"  # mdi-minus
      - "\U000F0415"  # mdi-plus
      - "\U000F050F"  # mdi-thermometer
