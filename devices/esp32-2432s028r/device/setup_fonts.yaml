# =============================================================================
# SETUP SCREEN FONTS - Minimal font set for setup/onboarding screens
# =============================================================================
# Replaces common/assets/fonts.yaml and common/assets/icons.yaml for this
# device. Only the three fonts hard-coded by ID in common setup screens are
# defined here. All main-UI fonts are in fonts.yaml as _xs variants.
# Skipping the duplicate base fonts (48px icon_font, 112px climate_target, etc.)
# saves ~300KB of flash — essential on the 4MB CYD.
# =============================================================================

font:
  # Setup screens: titles (40px light Roboto)
  - file: "gfonts://Roboto@Light"
    id: setup_title_font
    size: 40
    bpp: 4
    glyphs: >-
      !"#$%&'()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[\]^_`abcdefghijklmnopqrstuvwxyz{|}~
