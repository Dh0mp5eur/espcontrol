# =============================================================================
# DEVICE - ESP32-2432S028R hardware definition
# =============================================================================
# Platform config for the 2.8" CYD (Cheap Yellow Display) panel.
# Display: ILI9341 SPI (lcd bus: GPIO14/13, CS: GPIO15, DC: GPIO2, RST: GPIO12)
# Touch: XPT2046 resistive SPI (bus: GPIO25/32/39, CS: GPIO33) — calibrated
# Backlight: GPIO21 (LEDC PWM), RGB LED: GPIO4/16/17 (inverted, common anode)
# Ambient light: ADC GPIO34
# =============================================================================

substitutions:
  espcontrol_component_url: "https://github.com/Dh0mp5eur/espcontrol"
  espcontrol_component_ref: "main"

# ---------------------------------------------------------------------------
# ESP32 platform (4MB flash, ESP-IDF framework)
# ---------------------------------------------------------------------------
esp32:
  board: esp32dev
  variant: esp32
  flash_size: 4MB
  framework:
    type: esp-idf

# ---------------------------------------------------------------------------
# External component
# ---------------------------------------------------------------------------
external_components:
  - source:
      type: git
      url: ${espcontrol_component_url}
      ref: ${espcontrol_component_ref}
      path: components
    components: [espcontrol]
    refresh: 0s

espcontrol:

# ---------------------------------------------------------------------------
# ESPHome core (device name from substitutions)
# ---------------------------------------------------------------------------
esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  on_boot:
    - priority: -100
      then:
        - script.execute: apply_screen_rotation

# ---------------------------------------------------------------------------
# OTA updates (ESPHome native + HTTP-based)
# ---------------------------------------------------------------------------
ota:
  - platform: esphome
    on_begin:
      then:
        - light.turn_off: display_backlight
  - platform: http_request

# ---------------------------------------------------------------------------
# Shared infrastructure (API, logging, web server, restart button)
# ---------------------------------------------------------------------------
packages:
  core_infra: !include ../../../common/device/core_infra.yaml

# ---------------------------------------------------------------------------
# SPI buses — display + touchscreen
# ---------------------------------------------------------------------------
spi:
  - id: lcd
    clk_pin: GPIO14
    mosi_pin: GPIO13

  - id: touch_bus
    clk_pin: GPIO25
    mosi_pin: GPIO32
    miso_pin: GPIO39

# ---------------------------------------------------------------------------
# Outputs — backlight + RGB LED (inverted, common anode)
# ---------------------------------------------------------------------------
output:
  - platform: ledc
    pin: GPIO21
    id: gpio_backlight_pwm
    frequency: 150Hz
    min_power: 0.01
    zero_means_zero: true

  - platform: ledc
    id: rgb_led_red
    pin: GPIO4
    inverted: true

  - platform: ledc
    id: rgb_led_green
    pin: GPIO16
    inverted: true

  - platform: ledc
    id: rgb_led_blue
    pin: GPIO17
    inverted: true

# ---------------------------------------------------------------------------
# Lights — backlight + RGB LED
# ---------------------------------------------------------------------------
light:
  - platform: monochromatic
    output: gpio_backlight_pwm
    name: Display Backlight
    icon: mdi:lightbulb-on
    id: display_backlight
    restore_mode: RESTORE_DEFAULT_ON
    default_transition_length: 0s
    gamma_correct: 1.0
    on_turn_on:
      then:
        - if:
            condition:
              lambda: |-
                return id(screen_schedule_asleep) ||
                       (id(schedule_enabled).state && !id(ha_time).now().is_valid());
            then:
              - script.execute: backlight_force_display_off
            else:
              - if:
                  condition:
                    lambda: 'return id(screensaver_display_off_active);'
                  then:
                    - script.execute: screensaver_wake

  - platform: rgb
    name: RGB LED
    id: rgb_led
    icon: mdi:led-on
    red: rgb_led_red
    green: rgb_led_green
    blue: rgb_led_blue
    restore_mode: RESTORE_DEFAULT_OFF

# ---------------------------------------------------------------------------
# Ambient light sensor (ADC GPIO34)
# ---------------------------------------------------------------------------
sensor:
  - platform: adc
    pin: GPIO34
    id: ambient_light
    name: "Ambient Light"
    icon: mdi:brightness-5
    attenuation: 12db
    update_interval: 5s

# ---------------------------------------------------------------------------
# Display (2.8" 320x240 ILI9341 — mipi_spi with explicit pin config)
# ---------------------------------------------------------------------------
display:
  - platform: mipi_spi
    model: ESP32-2432S028
    spi_id: lcd
    id: my_display
    cs_pin:
      number: GPIO15
      ignore_strapping_warning: true
    dc_pin:
      number: GPIO2
      ignore_strapping_warning: true
    reset_pin:
      number: GPIO12
      ignore_strapping_warning: true
    color_order: bgr
    invert_colors: true
    update_interval: never
    auto_clear_enabled: false

# ---------------------------------------------------------------------------
# Touchscreen (XPT2046 resistive — calibrated with transform)
# ---------------------------------------------------------------------------
touchscreen:
  - platform: xpt2046
    id: my_touchscreen
    display: my_display
    spi_id: touch_bus
    cs_pin: GPIO33
    update_interval: 50ms
    threshold: 200
    calibration:
      x_min: 500
      x_max: 3650
      y_min: 380
      y_max: 3600
    transform:
      swap_xy: false
      mirror_x: true
      mirror_y: false
    on_touch:
      - script.execute: screensaver_wake

# ---------------------------------------------------------------------------
# LVGL base (display binding, must be before any page definitions)
# ---------------------------------------------------------------------------
lvgl:
  id: main_lvgl
  buffer_size: 25%
  displays: my_display
  touchscreens:
    - touchscreen_id: my_touchscreen
      long_press_time: 3s

script:
  - id: apply_screen_rotation
    then:
      - if:
          condition:
            lambda: 'return id(screen_rotation_select).current_option() == "180";'
          then:
            - lvgl.display.set_rotation: 180
          else:
            - lvgl.display.set_rotation: 0

select:
  - platform: template
    name: "Screen: Rotation"
    internal: true
    disabled_by_default: true
    id: screen_rotation_select
    entity_category: config
    icon: "mdi:screen-rotation"
    optimistic: true
    restore_value: true
    initial_option: "0"
    options:
      - "0"
      - "180"
    on_value:
      then:
        - script.execute: apply_screen_rotation
