# =============================================================================
# DEVICE - Sunton ESP32-S3-8048S043C hardware definition
# =============================================================================
# Pin assignments, peripherals, and platform config for the 4.3" landscape
# panel. Includes the ESP32-S3 SoC (native WiFi), DPI RGB display, GT911
# capacitive touchscreen, and backlight PWM.
# =============================================================================

substitutions:
  espcontrol_component_url: "https://github.com/Dh0mp5eur/espcontrol"
  espcontrol_component_ref: "main"

# ---------------------------------------------------------------------------
# ESP32-S3 platform (16MB flash, ESP-IDF framework)
# ---------------------------------------------------------------------------
esp32:
  board: esp32-s3-devkitc-1
  flash_size: 16MB
  framework:
    type: esp-idf
    sdkconfig_options:
      # Allocate mbedTLS buffers from PSRAM so firmware downloads can connect.
      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      # Keep WiFi startup inside the internal-RAM budget after the RGB display
      # and LVGL buffers are initialized.
      CONFIG_ESP_WIFI_STATIC_RX_BUFFER_NUM: "8"
      CONFIG_SPIRAM_TRY_ALLOCATE_WIFI_LWIP: "y"

# ---------------------------------------------------------------------------
# External component
# ---------------------------------------------------------------------------
external_components:
  - source:
      type: git
      url: ${espcontrol_component_url}
      ref: ${espcontrol_component_ref}
      path: components
    components: [espcontrol]
    refresh: 0s

espcontrol:

# ---------------------------------------------------------------------------
# ESPHome core (device name from substitutions)
# ---------------------------------------------------------------------------
# ESP32-S3 with octal PSRAM and DPI RGB display fails to reinitialize
# peripherals after a software reset. A brief deep sleep forces a full
# hardware reset on wake, equivalent to a power cycle. The on_boot
# handler catches USB-triggered and software-triggered resets (the
# latter fired by the "Apply Configuration" restart button); the OTA
# on_end hook catches wireless updates.
# ---------------------------------------------------------------------------
esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  platformio_options:
    board_build.flash_mode: dio
  on_boot:
    - priority: 800
      then:
        - lambda: |-
            auto reason = esp_reset_reason();
            if (reason == ESP_RST_USB || reason == ESP_RST_SW) {
              esp_sleep_enable_timer_wakeup(100000);
              esp_deep_sleep_start();
            }
    - priority: -100
      then:
        - script.execute: apply_screen_rotation

# ---------------------------------------------------------------------------
# PSRAM (video frame buffer memory)
# ---------------------------------------------------------------------------
psram:
  mode: octal
  speed: 80MHz

# ---------------------------------------------------------------------------
# OTA updates (ESPHome native + HTTP-based)
# ---------------------------------------------------------------------------
ota:
  - platform: esphome
    on_begin:
      then:
        - light.turn_off: display_backlight
    on_end:
      then:
        - lambda: |-
            esp_sleep_enable_timer_wakeup(100000);
            esp_deep_sleep_start();
  - platform: http_request

# ---------------------------------------------------------------------------
# Shared infrastructure (API, logging, web server, restart button)
# ---------------------------------------------------------------------------
packages:
  core_infra: !include ../../../common/device/core_infra.yaml

wifi:
  use_psram: true

# GPIO19/20 are the USB D-/D+ pins on ESP32-S3. Using them for I2C
# (touchscreen) conflicts with USB-Serial-JTAG, so route the logger
# to UART0 instead.
logger:
  hardware_uart: UART0

# ---------------------------------------------------------------------------
# Backlight (LEDC PWM output + monochromatic light entity)
# ---------------------------------------------------------------------------
output:
  - platform: ledc
    pin: GPIO2
    id: gpio_backlight_pwm
    frequency: 150Hz
    min_power: 0.01
    zero_means_zero: true

light:
  - platform: monochromatic
    output: gpio_backlight_pwm
    name: Display Backlight
    icon: mdi:lightbulb-on
    id: display_backlight
    restore_mode: RESTORE_DEFAULT_ON
    default_transition_length: 0s
    gamma_correct: 1.0
    on_turn_on:
      then:
        - if:
            condition:
              lambda: |-
                return id(screen_schedule_asleep) ||
                       (id(schedule_enabled).state && !panel_time_or_fallback(id(panel_time).now(), id(homeassistant_time).now()).is_valid());
            then:
              - script.execute: backlight_force_display_off
            else:
              - if:
                  condition:
                    lambda: 'return id(screensaver_display_off_active);'
                  then:
                    - script.execute: screensaver_wake

# ---------------------------------------------------------------------------
# I2C bus and touchscreen (GT911 capacitive, wakes screensaver on touch)
# ---------------------------------------------------------------------------
i2c:
  - id: bus_a
    scl: GPIO20
    sda: GPIO19

touchscreen:
  - platform: gt911
    id: my_touchscreen
    display: my_display
    update_interval: 16ms
    on_touch:
      - script.execute: screensaver_wake

# ---------------------------------------------------------------------------
# Display (4.3" 800x480 DPI RGB panel)
# ---------------------------------------------------------------------------
display:
  - platform: mipi_rgb
    model: ESP32-8048S050
    id: my_display
    # Start WiFi before the RGB panel allocates its frame buffers; otherwise the
    # WiFi driver can fail to claim enough internal RX buffers on fresh boots.
    setup_priority: 240
    update_interval: never
    auto_clear_enabled: false

# ---------------------------------------------------------------------------
# LVGL base (display binding, must be before any page definitions)
# ---------------------------------------------------------------------------
lvgl:
  id: main_lvgl
  # Keep LVGL after WiFi and after the display driver.
  setup_priority: 230
  buffer_size: 25%
  displays: my_display
  touchscreens:
    - touchscreen_id: my_touchscreen
      long_press_time: 3s

script:
  - id: apply_screen_rotation
    then:
      - if:
          condition:
            lambda: 'return id(screen_rotation_select).current_option() == "180";'
          then:
            - lvgl.display.set_rotation: 180
          else:
            - lvgl.display.set_rotation: 0

select:
  - platform: template
    name: "Screen: Rotation"
    internal: true
    disabled_by_default: true
    id: screen_rotation_select
    entity_category: config
    icon: "mdi:screen-rotation"
    optimistic: true
    restore_value: true
    initial_option: "0"
    options:
      - "0"
      - "180"
    on_value:
      then:
        - script.execute: apply_screen_rotation
