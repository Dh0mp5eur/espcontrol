# =============================================================================
# BUILD PROFILE - ESP32-2432S028R (2.8" CYD)
# =============================================================================
# CI/local build entry point for the 320×240 CYD ESP32 panel.
# =============================================================================

substitutions:
  name: "espcontrol-2432s028r"
  friendly_name: "ESP32-2432S028R"
  espcontrol_component_url: "file:///config"
  espcontrol_component_ref: "HEAD"

esphome:
  name_add_mac_suffix: true

packages:
  espcontrol: !include ../devices/esp32-2432s028r/packages.yaml

esp32:
  partitions: partitions_esp32_4mb.csv

wifi:
  ap:
    ssid: "${friendly_name}"

captive_portal:
