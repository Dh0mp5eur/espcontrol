# =============================================================================
# FACTORY BUILD - ESP32-2432S028R (2.8" CYD)
# =============================================================================
# Factory image: www.js bundled inline for first-boot web UI access.
# =============================================================================

substitutions:
  firmware_version: "0.0.0"
  espcontrol_component_url: "file:///config"
  espcontrol_component_ref: "HEAD"

packages:
  core: !include esp32-2432s028r.yaml

esphome:
  project:
    name: Dh0mp5eur.espcontrol
    version: "${firmware_version}"

dashboard_import:
  package_import_url: github://Dh0mp5eur/espcontrol/devices/esp32-2432s028r/esphome.yaml@main

web_server:
  port: 80
  version: 3
  js_url: ""
  js_include: "../docs/public/webserver/esp32-2432s028r/www.js"
